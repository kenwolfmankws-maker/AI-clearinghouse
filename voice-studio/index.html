<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Studio - Narration & Podcast Production</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="voice-studio-container">
        <!-- Header -->
        <header class="vs-header">
            <div class="vs-header-content">
                <h1 class="vs-title">🎙️ Voice Studio</h1>
                <p class="vs-subtitle">Narration & Podcast Production Module</p>
            </div>
            <div class="vs-header-controls">
                <button id="toggleProjectPanel" class="vs-btn vs-btn-secondary" title="Manage Projects">
                    📁 Projects
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="vs-main">
            <!-- Left Sidebar: Script Panel -->
            <aside class="vs-sidebar vs-sidebar-left">
                <div class="vs-panel">
                    <div class="vs-panel-header">
                        <h2>Script & Markers</h2>
                        <button id="toggleScript" class="vs-btn-icon" title="Collapse/Expand">—</button>
                    </div>
                    <div class="vs-panel-body">
                        <textarea id="scriptEditor" class="vs-script-editor" placeholder="Paste your script or narration text here..."></textarea>
                        <div class="vs-script-controls">
                            <button id="clearScript" class="vs-btn vs-btn-small vs-btn-secondary">Clear</button>
                            <button id="addMarker" class="vs-btn vs-btn-small vs-btn-accent">+ Add Marker</button>
                        </div>
                        <div id="markersList" class="vs-markers-list"></div>
                    </div>
                </div>
            </aside>

            <!-- Center Content: Recording & Playback -->
            <div class="vs-center">
                <!-- Session Info -->
                <div class="vs-session-info">
                    <div class="vs-session-take">
                        <span class="vs-label">Current Session:</span>
                        <span id="currentProject" class="vs-value">New Session</span>
                    </div>
                    <div class="vs-session-take">
                        <span class="vs-label">Take:</span>
                        <span id="currentTake" class="vs-value">1</span>
                    </div>
                </div>

                <!-- Recording Controls -->
                <div class="vs-recording-section">
                    <div class="vs-controls-group">
                        <button id="startBtn" class="vs-btn vs-btn-primary vs-btn-large">🔴 Start Recording</button>
                        <button id="pauseBtn" class="vs-btn vs-btn-secondary vs-btn-large" disabled>⏸ Pause</button>
                        <button id="stopBtn" class="vs-btn vs-btn-danger vs-btn-large" disabled>⏹ Stop</button>
                    </div>
                    <div class="vs-controls-group vs-takes-controls">
                        <button id="newTakeBtn" class="vs-btn vs-btn-secondary" disabled>+ New Take</button>
                        <button id="retakeBtn" class="vs-btn vs-btn-secondary" disabled>↻ Retake</button>
                    </div>
                </div>

                <!-- Recording Status -->
                <div class="vs-status">
                    <div class="vs-status-indicator">
                        <span id="recordingStatus" class="vs-status-dot vs-status-idle"></span>
                        <span id="statusText" class="vs-status-text">Ready</span>
                    </div>
                    <div class="vs-recording-time">
                        <span id="elapsedTime" class="vs-time">00:00</span>
                    </div>
                </div>

                <!-- Waveform Visualization -->
                <div class="vs-waveform-container">
                    <canvas id="waveformCanvas" class="vs-canvas"></canvas>
                    <div class="vs-waveform-overlay">
                        <div id="playbackLine" class="vs-playback-line"></div>
                    </div>
                </div>

                <!-- Playback Controls (Post-Recording) -->
                <div id="playbackControls" class="vs-playback-controls" style="display: none;">
                    <div class="vs-playback-actions">
                        <button id="playBtn" class="vs-btn vs-btn-icon" title="Play">▶</button>
                        <button id="pausePlayBtn" class="vs-btn vs-btn-icon" title="Pause">⏸</button>
                        <button id="stopPlayBtn" class="vs-btn vs-btn-icon" title="Stop">⏹</button>
                    </div>

                    <div class="vs-playback-time">
                        <span id="currentTime" class="vs-time">00:00</span>
                        <span class="vs-time-separator">/</span>
                        <span id="totalTime" class="vs-time">00:00</span>
                    </div>

                    <div class="vs-playback-slider-group">
                        <input id="playbackSlider" type="range" class="vs-slider" min="0" max="100" value="0" disabled>
                    </div>

                    <div class="vs-playback-settings">
                        <div class="vs-speed-control">
                            <label for="speedControl">Speed:</label>
                            <select id="speedControl" class="vs-select">
                                <option value="0.75">0.75x</option>
                                <option value="1" selected>1x</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                            </select>
                        </div>
                        <div class="vs-volume-control">
                            <label for="volumeControl">Volume:</label>
                            <input id="volumeControl" type="range" class="vs-slider-small" min="0" max="100" value="80">
                        </div>
                    </div>
                </div>

                <!-- Recording Metadata Display -->
                <div id="recordingMetadata" class="vs-metadata" style="display: none;">
                    <div class="vs-metadata-row">
                        <span class="vs-metadata-label">Duration:</span>
                        <span id="metaDuration" class="vs-metadata-value">--:--</span>
                    </div>
                    <div class="vs-metadata-row">
                        <span class="vs-metadata-label">File Size:</span>
                        <span id="metaFileSize" class="vs-metadata-value">0 KB</span>
                    </div>
                    <div class="vs-metadata-row">
                        <span class="vs-metadata-label">Microphone:</span>
                        <span id="metaMicrophone" class="vs-metadata-value">Default</span>
                    </div>
                    <div class="vs-metadata-row">
                        <span class="vs-metadata-label">Timestamp:</span>
                        <span id="metaTimestamp" class="vs-metadata-value">--</span>
                    </div>
                </div>

                <!-- Export Options -->
                <div id="exportOptions" class="vs-export-options" style="display: none;">
                    <h3>Export Recording</h3>
                    <div class="vs-export-buttons">
                        <button id="exportWebM" class="vs-btn vs-btn-primary">
                            📥 Download WebM
                        </button>
                        <button id="exportWAV" class="vs-btn vs-btn-primary">
                            📥 Download WAV
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar: Recording Library & Session History -->
            <aside class="vs-sidebar vs-sidebar-right">
                <!-- Tabs -->
                <div class="vs-tabs">
                    <button class="vs-tab-btn vs-tab-active" data-tab="library">📚 Library</button>
                    <button class="vs-tab-btn" data-tab="takes">📋 Takes</button>
                </div>

                <!-- Library Tab -->
                <div id="libraryTab" class="vs-tab-content vs-tab-content-active">
                    <div class="vs-panel">
                        <div class="vs-panel-header">
                            <h2>Recording Library</h2>
                        </div>
                        <div class="vs-library-controls">
                            <input type="text" id="searchRecordings" class="vs-input" placeholder="Search recordings...">
                            <select id="sortRecordings" class="vs-select vs-select-small">
                                <option value="date-desc">Newest First</option>
                                <option value="date-asc">Oldest First</option>
                                <option value="duration">By Duration</option>
                                <option value="name">By Name</option>
                            </select>
                        </div>
                        <div id="recordingsList" class="vs-recordings-list"></div>
                    </div>
                </div>

                <!-- Takes Tab -->
                <div id="takesTab" class="vs-tab-content">
                    <div class="vs-panel">
                        <div class="vs-panel-header">
                            <h2>Session Takes</h2>
                        </div>
                        <div id="sessionTakes" class="vs-takes-list"></div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Project Panel (Modal) -->
    <div id="projectPanel" class="vs-modal" style="display: none;">
        <div class="vs-modal-content">
            <div class="vs-modal-header">
                <h2>Projects</h2>
                <button id="closeProjectPanel" class="vs-btn-icon" title="Close">✕</button>
            </div>
            <div class="vs-modal-body">
                <div class="vs-project-controls">
                    <input type="text" id="newProjectName" class="vs-input" placeholder="Project name...">
                    <button id="createProjectBtn" class="vs-btn vs-btn-primary vs-btn-small">Create Project</button>
                </div>
                <div id="projectsList" class="vs-projects-list"></div>
            </div>
        </div>
    </div>

    <!-- Recording Edit Modal -->
    <div id="editRecordingModal" class="vs-modal" style="display: none;">
        <div class="vs-modal-content vs-modal-small">
            <div class="vs-modal-header">
                <h2>Edit Recording</h2>
                <button id="closeEditModal" class="vs-btn-icon" title="Close">✕</button>
            </div>
            <div class="vs-modal-body">
                <div class="vs-form-group">
                    <label for="editRecordingName">Recording Name:</label>
                    <input type="text" id="editRecordingName" class="vs-input">
                </div>
                <div class="vs-form-actions">
                    <button id="saveRecordingName" class="vs-btn vs-btn-primary">Save</button>
                    <button id="cancelEditModal" class="vs-btn vs-btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="vs-toast-container"></div>

    <!-- Scripts -->
    <script src="utils/wavEncoder.js"></script>
    <script src="utils/fileManager.js"></script>
    <script src="utils/projectManager.js"></script>
    <script src="utils/scriptManager.js"></script>
    <script src="recorder.js"></script>
    <script src="waveform.js"></script>
    <script src="components/playbackControls.js"></script>
    <script src="components/recordingLibrary.js"></script>
    <script src="components/sessionHistory.js"></script>
    <script src="components/scriptPanel.js"></script>
    <script src="components/projectPanel.js"></script>
    <script src="app.js"></script>
</body>
</html>
