<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Verification - AI Clearinghouse</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { color: #60a5fa; }
    .check { padding: 15px; margin: 10px 0; border-radius: 8px; }
    .success { background: #065f46; border-left: 4px solid #10b981; }
    .error { background: #7f1d1d; border-left: 4px solid #ef4444; }
    .warning { background: #78350f; border-left: 4px solid #f59e0b; }
    .info { background: #1e3a8a; border-left: 4px solid #3b82f6; }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover { background: #2563eb; }
    code {
      background: #1e293b;
      padding: 2px 6px;
      border-radius: 4px;
      color: #fbbf24;
    }
    .status { font-weight: bold; margin-right: 10px; }
  </style>
</head>
<body>
  <h1>🔍 AI Clearinghouse Setup Verification</h1>
  <p>This tool checks if your setup is complete and ready for deployment.</p>
  
  <button onclick="runChecks()">Run Verification</button>
  <button onclick="location.reload()">Refresh</button>
  
  <div id="results"></div>

  <script type="module">
    window.runChecks = async function() {
      const results = document.getElementById('results');
      results.innerHTML = '<h2>Running checks...</h2>';
      
      const checks = [];
      
      // Check 1: Supabase URL
      const supabaseUrl = 'https://renuhdmxolunjqjbslga.supabase.co';
      checks.push({
        name: 'Supabase URL',
        status: 'success',
        message: `Connected to: ${supabaseUrl}`
      });
      
      // Check 2: Environment Variables
      const hasEnvVars = import.meta.env.VITE_SUPABASE_ANON_KEY !== undefined;
      checks.push({
        name: 'Environment Variables',
        status: hasEnvVars ? 'success' : 'warning',
        message: hasEnvVars 
          ? 'Environment variables detected' 
          : 'No .env file found. Using fallback configuration.'
      });
      
      // Check 3: Supabase Connection
      try {
        const response = await fetch(`${supabaseUrl}/rest/v1/`, {
          headers: {
            'apikey': import.meta.env.VITE_SUPABASE_ANON_KEY || 'test'
          }
        });
        
        checks.push({
          name: 'Supabase Connection',
          status: response.ok ? 'success' : 'error',
          message: response.ok 
            ? 'Successfully connected to Supabase' 
            : `Connection failed: ${response.status}`
        });
      } catch (error) {
        checks.push({
          name: 'Supabase Connection',
          status: 'error',
          message: `Connection error: ${error.message}`
        });
      }
      
      // Check 4: Build Configuration
      checks.push({
        name: 'Build Configuration',
        status: 'success',
        message: 'Vite + React setup detected'
      });
      
      // Display results
      let html = '<h2>Verification Results</h2>';
      checks.forEach(check => {
        const icon = check.status === 'success' ? '✅' : 
                     check.status === 'error' ? '❌' : '⚠️';
        html += `
          <div class="check ${check.status}">
            <span class="status">${icon} ${check.name}</span>
            <div>${check.message}</div>
          </div>
        `;
      });
      
      // Add recommendations
      const hasErrors = checks.some(c => c.status === 'error');
      const hasWarnings = checks.some(c => c.status === 'warning');
      
      if (hasErrors) {
        html += `
          <div class="check error">
            <strong>⚠️ Action Required</strong>
            <p>Critical issues detected. Please:</p>
            <ol>
              <li>Get your full Supabase anon key from the dashboard</li>
              <li>Create a <code>.env</code> file with <code>VITE_SUPABASE_ANON_KEY</code></li>
              <li>Run <code>npm run dev</code> to restart</li>
            </ol>
          </div>
        `;
      } else if (hasWarnings) {
        html += `
          <div class="check warning">
            <strong>⚠️ Recommendations</strong>
            <p>Setup is functional but could be improved:</p>
            <ul>
              <li>Create <code>.env</code> file for better security</li>
              <li>Run database setup SQL in Supabase</li>
              <li>Test authentication features</li>
            </ul>
          </div>
        `;
      } else {
        html += `
          <div class="check success">
            <strong>✅ All Checks Passed!</strong>
            <p>Your setup looks good. Next steps:</p>
            <ol>
              <li>Run <code>npm run build</code> to create production build</li>
              <li>Deploy to Vercel or your preferred host</li>
              <li>Start sharing on social media!</li>
            </ol>
          </div>
        `;
      }
      
      results.innerHTML = html;
    };
  </script>
</body>
</html>
